name: Build Windows EXE

on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - run: pip install pyinstaller ezdxf
    - run: pyinstaller --onefile --windowed dxf_converter.py
    - uses: actions/upload-artifact@v3
      with:
        name: dxf-converter-exe
        path: dist/dxf_converter.exe
